appId: com.carlos3g.echoes
---
- runFlow:
    file: ../setup-app.yaml

- runScript:
    file: ../scripts/env.js

# Navigate to forgot password screen
- tapOn:
    id: 'go-to-forgot-password-button'

# Verify initial state
- assertVisible: 'Esqueci minha senha'
- assertVisible: 'Digite seu e-mail e enviaremos as instruções para redefinição de senha'
- assertVisible:
    id: 'forgot-password-button'
- assertTrue: 'forgot-password-button.enabled == false'

# Fill in email
- tapOn:
    id: 'forgot-password-email-input'
- inputText: ${output.FORGOT_PASSWORD_EMAIL}
- hideKeyboard

# Submit form
- tapOn:
    id: 'forgot-password-button'

# Verify success message (adjust based on actual app behavior)
- waitForAnimationToEnd:
    timeout: 2000
