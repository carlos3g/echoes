appId: com.carlos3g.echoes
---
- runFlow:
    file: ../setup-app.yaml

- runScript:
    file: ../scripts/env.js

# Sign in first
- runFlow:
    file: ../helpers/sign-in-helper.yaml
    env:
      EMAIL: ${output.EMAIL}
      PASSWORD: ${output.PASSWORD}

# Navigate to feed tab
- tapOn: 'Feed'
- waitForAnimationToEnd:
    timeout: 2000

# Verify feed screen is visible - either has content or empty state
- runFlow:
    when:
      visible: 'Nenhuma novidade ainda'
    commands:
      - assertVisible: 'Nenhuma novidade ainda'

# Scroll feed
- swipe:
    direction: UP
    duration: 500
- swipe:
    direction: DOWN
    duration: 500

# Pull to refresh
- swipe:
    direction: DOWN
    duration: 300
- waitForAnimationToEnd:
    timeout: 2000
