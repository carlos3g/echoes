appId: com.carlos3g.echoes
env:
  EMAIL: 'test@gmail.com'
  PASSWORD: 'p@ss9ord1!'
  CURRENT_PASSWORD: 'p@ss9ord1!'
  NEW_PASSWORD: 'p@ss9ord1!1'
  INVALID_PASSWORD: 'pp@ss9ord1!'
---
- runFlow:
    file: ../setup-app.yaml

- tapOn:
    id: 'signin-email-input'
- inputText: ${EMAIL}
- tapOn:
    id: 'signin-password-input'
- inputText: ${PASSWORD}
- hideKeyboard
- tapOn:
    id: 'signin-button'

- tapOn:
    id: 'settings-tab-button'
- tapOn:
    id: 'go-to-change-password-button'

- assertVisible:
    id: 'change-password-button'
- assertTrue: 'change-password-button.enabled == false'

- tapOn:
    id: 'current-password-input'
- inputText: ${INVALID_PASSWORD}
- tapOn:
    id: 'new-password-input'
- inputText: ${INVALID_PASSWORD}
- tapOn:
    id: 'new-password-confirmation-input'
- inputText: ${INVALID_PASSWORD}
- hideKeyboard
- tapOn:
    id: 'change-password-button'
- assertVisible: 'Não foi possível alterar a senha!'
- assertVisible: 'Talvez você digitou a senha atual incorretamente?'

- tapOn:
    id: 'current-password-input'
- eraseText
- inputText: ${CURRENT_PASSWORD}
- tapOn:
    id: 'new-password-input'
- eraseText
- inputText: ${NEW_PASSWORD}
- tapOn:
    id: 'new-password-confirmation-input'
- eraseText
- inputText: ${CURRENT_PASSWORD}
- assertVisible: 'As senhas inseridas devem ser iguais'

- tapOn:
    id: 'current-password-input'
- eraseText
- inputText: ${CURRENT_PASSWORD}
- tapOn:
    id: 'new-password-input'
- eraseText
- inputText: ${NEW_PASSWORD}
- tapOn:
    id: 'new-password-confirmation-input'
- eraseText
- inputText: ${NEW_PASSWORD}
- tapOn:
    id: 'change-password-button'
- assertVisible: 'Senha alterada com sucesso!'

- tapOn:
    id: 'current-password-input'
- eraseText
- inputText: ${NEW_PASSWORD}
- tapOn:
    id: 'new-password-input'
- eraseText
- inputText: ${CURRENT_PASSWORD}
- tapOn:
    id: 'new-password-confirmation-input'
- eraseText
- inputText: ${CURRENT_PASSWORD}
- tapOn:
    id: 'change-password-button'
- assertVisible: 'Senha alterada com sucesso!'
