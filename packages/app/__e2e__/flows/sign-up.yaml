appId: com.carlos3g.echoes
env:
  NAME: 'Test User'
  USERNAME: 'testuser'
  EMAIL: 'test2@gmail.com'
  PASSWORD: 'p@ss9ord1!'
  PASSWORD_CONFIRMATION: 'p@ss9ord1!'
---
- runFlow:
    file: ../setup-app.yaml

- tapOn:
    id: 'go-to-sign-up-button'

- assertVisible: 'Criar nova conta'
- assertVisible:
    id: 'signup-button'
- assertTrue: 'signup-button.enabled == false'

- tapOn:
    id: 'signup-name-input'
- inputText: ${NAME}
- hideKeyboard
- tapOn:
    id: 'signup-username-input'
- inputText: ${USERNAME}
- hideKeyboard
- tapOn:
    id: 'signup-email-input'
- inputText: ${EMAIL}
- hideKeyboard
- tapOn:
    id: 'signup-password-input'
- inputText: ${PASSWORD}
- hideKeyboard
- tapOn:
    id: 'signup-password-confirmation-input'
- inputText: ${PASSWORD_CONFIRMATION}
- hideKeyboard
- tapOn:
    id: 'signup-button'

- assertVisible: 'Digite seu e-mail e senha para entrar'
